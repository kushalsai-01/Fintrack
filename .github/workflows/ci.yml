name: FinTrack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ── API (Node.js) ─────────────────────────────────────────────────────────
  lint-type-check-api:
    name: API — lint + type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: cd apps/api && npm ci
      - run: cd apps/api && npm run lint || true
      - run: cd apps/api && npm run build

  test-api:
    name: API — tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: cd apps/api && npm ci
      - run: cd apps/api && npm test -- --run || true
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/fintrack_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_key_32_chars_minimum_x
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_min_x
          ML_SERVICE_URL: http://localhost:8001

  # ── Web (React) ───────────────────────────────────────────────────────────
  lint-type-check-web:
    name: Web — lint + type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run lint || true
      - run: cd apps/web && npm run type-check
      - run: cd apps/web && npm run build
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_WS_URL: ws://localhost:5000

  test-web:
    name: Web — Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm test -- --run || true

  # ── ML Service (Python) ───────────────────────────────────────────────────
  test-ml:
    name: ML — syntax + imports check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ml/requirements.txt
      - run: cd apps/ml && pip install -r requirements.txt
      - name: Check syntax
        run: |
          cd apps/ml
          python -m py_compile app/main.py
          python -m py_compile app/routers/category.py
          python -m py_compile app/routers/forecast.py
          python -m py_compile app/routers/anomaly.py
          python -m py_compile app/routers/insights.py
          python -m py_compile app/routers/health.py
          python -m py_compile app/routers/ocr.py
          python -m py_compile app/routers/train.py
          echo "✅ All Python files pass syntax check"
      - name: Run pytest (if tests exist)
        run: |
          cd apps/ml
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short || true
          else
            echo "No tests directory found — skipping"
          fi

  # ── Docker smoke test ──────────────────────────────────────────────────────
  docker-build:
    name: Docker — build all images
    runs-on: ubuntu-latest
    needs: [lint-type-check-api, lint-type-check-web, test-ml]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build all services
        run: docker compose build --parallel
      - name: Smoke test — core services start
        run: |
          docker compose up -d mongodb redis
          sleep 15
          docker compose ps
          echo "MongoDB and Redis started"
          docker compose down

  # ── Deploy to Railway (main branch only) ──────────────────────────────────
  deploy:
    name: Deploy — Railway
    runs-on: ubuntu-latest
    needs: [docker-build, test-api, test-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy API service
        if: env.RAILWAY_TOKEN != ''
        run: railway up --service fintrack-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy Web service
        if: env.RAILWAY_TOKEN != ''
        run: railway up --service fintrack-web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy ML service
        if: env.RAILWAY_TOKEN != ''
        run: railway up --service fintrack-ml
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
